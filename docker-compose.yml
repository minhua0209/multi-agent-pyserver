services:
  multi-agent-pyserver:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/python:3.12-slim
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
    image: multi-agent-pyserver:latest
    container_name: multi-agent-pyserver
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL before starting Docker Compose}"
      MODEL_RESPONSES_API_URL: "${MODEL_RESPONSES_API_URL:?Set MODEL_RESPONSES_API_URL before starting Docker Compose}"
      MODEL_API_KEY: "${MODEL_API_KEY:?Set MODEL_API_KEY before starting Docker Compose}"
      MODEL_NAME: qwen3.6-35b
      MODEL_MAX_OUTPUT_TOKENS: "1024000"
      ENABLE_SYSTEM_MOCK_FALLBACK: "false"
      TASK_PLANNER_TYPE: crewai
    restart: unless-stopped
