  <text x="442" y="374" font-family="Arial, sans-serif" font-size="14" fill="#334155">上下文汇总：## 用户故事拆解报告...</text>
  <text x="442" y="400" font-family="Arial, sans-serif" font-size="14" fill="#64748b">人工需要自己判断这里是不是要审核的文档</text>
