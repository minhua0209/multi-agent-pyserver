  <rect x="86" y="222" width="256" height="78" rx="8" fill="#eef2ff" stroke="#bfdbfe"/>
  <text x="106" y="252" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">人工确认</text>
  <text x="106" y="280" font-family="Arial, sans-serif" font-size="14" fill="#64748b">所属任务：汇总报告</text>
  <rect x="396" y="154" width="468" height="284" rx="10" fill="#fff" stroke="#dbe4ff"/>
  <text x="420" y="194" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">人工处理</text>
  <rect x="420" y="222" width="420" height="72" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
