  <text x="64" y="116" font-family="Arial, sans-serif" font-size="16" fill="#64748b">修改前：上游产出藏在上下文区域，不像一份待审核文档。</text>
  <rect x="64" y="154" width="300" height="284" rx="10" fill="#f8fafc" stroke="#dbe4ff"/>
